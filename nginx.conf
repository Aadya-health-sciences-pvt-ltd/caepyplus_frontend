server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Hide nginx version from headers and error pages (security hardening)
    server_tokens off;

    # Security headers
    add_header X-Frame-Options           "SAMEORIGIN"         always;
    add_header X-Content-Type-Options    "nosniff"            always;
    add_header Referrer-Policy           "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection          "1; mode=block"      always;

    # Compression
    gzip            on;
    gzip_vary       on;  # Required so CDNs (CloudFront, ALB) serve correct compressed responses
    gzip_proxied    any;
    gzip_comp_level 6;
    gzip_types      text/plain text/css application/json application/javascript
                    text/xml application/xml application/xml+rss text/javascript
                    image/svg+xml;
    gzip_min_length 1024;

    # Logging — structured format for CloudWatch / Loki ingestion
    access_log /var/log/nginx/access.log combined;
    error_log  /var/log/nginx/error.log  warn;

    # ── API reverse proxy ───────────────────────────────────────────────────────
    # BACKEND_URL is injected at container startup via an environment variable.
    #
    # ECS (Task Definition): set BACKEND_URL env var on the container, then use
    #   an entrypoint script (or AWS Secrets Manager) to call envsubst before
    #   starting nginx.
    #
    # Kubernetes: use a ConfigMap for nginx.conf with the ClusterIP service name,
    #   e.g. http://backend-svc.default.svc.cluster.local:8000
    #
    # Local docker-compose: set BACKEND_URL=http://backend:8000
    #
    location /api/ {
        proxy_pass         ${BACKEND_URL};
        proxy_http_version 1.1;

        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Prevent hanging connections
        proxy_connect_timeout 10s;
        proxy_send_timeout    60s;
        proxy_read_timeout    60s;

        # Disable proxy buffering for SSE / streaming responses
        proxy_buffering    off;
    }

    # ── Static assets ───────────────────────────────────────────────────────────
    # Vite fingerprints all JS/CSS filenames — safe to cache for 1 year
    location ~* \.(?:js|css|woff2?|ttf|eot|svg|png|jpg|jpeg|gif|ico|webp)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header X-Content-Type-Options "nosniff" always;
        try_files $uri =404;
    }

    # ── Healthcheck endpoint ────────────────────────────────────────────────────
    # Used by ECS liveness check, k8s liveness + readiness probes, and ALB target health
    location /healthz {
        access_log off;
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    # ── SPA fallback ────────────────────────────────────────────────────────────
    # All non-file routes fall back to index.html so React Router deep links work
    location / {
        try_files $uri $uri/ /index.html;

        # index.html should never be cached (always fetch the latest shell)
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
    }
}
